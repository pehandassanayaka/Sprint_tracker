server {
    listen 80;
    server_name pehanvps.dynv6.net;

    # Certbot webroot verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS on port 8443
    location / {
        return 301 https://pehanvps.dynv6.net:8443$request_uri;
    }
}

server {
    listen 8443 ssl;
    server_name pehanvps.dynv6.net;

    ssl_certificate /etc/letsencrypt/live/pehanvps.dynv6.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pehanvps.dynv6.net/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
